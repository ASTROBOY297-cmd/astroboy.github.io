<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>商品マスタ - 家計在庫アプリ（Web版）</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <h1>家計在庫アプリ（Web版）</h1>
  <nav class="tabs">
    <a class="btn" href="home.html">ホーム</a>
    <a class="btn" href="input.html">買い物入力</a>
    <a class="btn" href="inventory.html">在庫一覧</a>
    <a class="btn" href="history.html">履歴</a>
    <a class="btn" href="shopping.html">買い物リスト</a>
    <a class="btn primary" href="master.html">商品マスタ</a>
    <a class="btn" href="settings.html">設定/バックアップ</a>
  </nav>
</header>
<main>
<section class="page"><h2>商品マスタ</h2><form id="master-form" class="form-grid"><label>商品名<input type="text" id="m-item" required></label><label>カテゴリ<input type="text" id="m-cat" placeholder="例：乳製品"></label><label>発注点<input type="number" id="m-reorder" min="0" step="1" value="1"></label><label>単位<input type="text" id="m-unit" value="個"></label><label>メモ<input type="text" id="m-note" placeholder="任意"></label><div class="form-actions"><button class="btn" type="submit">登録/更新</button></div></form><table class="table" id="master-table"><thead><tr><th>商品名</th><th>カテゴリ</th><th>発注点</th><th>単位</th><th>メモ</th><th></th></tr></thead><tbody></tbody></table></section>
</main>
<footer class="app-footer">
  <span>© 2026 家計在庫アプリ（Web版）</span>
  <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub Pages でホスト</a>
</footer>
<script src="app.js"></script>
</body>
</html>
