<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>買い物入力 - 家計在庫アプリ（Web版）</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
  <h1>家計在庫アプリ（Web版）</h1>
  <nav class="tabs">
    <a class="btn" href="home.html">ホーム</a>
    <a class="btn primary" href="input.html">買い物入力</a>
    <a class="btn" href="inventory.html">在庫一覧</a>
    <a class="btn" href="history.html">履歴</a>
    <a class="btn" href="shopping.html">買い物リスト</a>
    <a class="btn" href="master.html">商品マスタ</a>
    <a class="btn" href="settings.html">設定/バックアップ</a>
  </nav>
</header>
<main>
<section class="page"><h2>買い物入力（購入/使用）</h2><form id="purchase-form" class="form-grid"><label>日付<input type="date" id="in-date" required></label><label>商品名<input type="text" id="in-item" list="items-list" placeholder="例：牛乳" required></label><datalist id="items-list"></datalist><label>区分<select id="in-type"><option value="購入">購入</option><option value="使用">使用</option></select></label><label>数量<input type="number" id="in-qty" min="1" step="1" value="1" required></label><label>備考<input type="text" id="in-note" placeholder="任意"></label><div class="form-actions"><button type="submit" class="btn primary">追加</button><button type="button" id="btn-bulk-add" class="btn">よく買う品（+1）</button></div></form><p class="hint">※ 同じ「日付／商品名／区分」で再入力した場合は、履歴の既存行に数量を加算します（新規行を増やしません）。</p><h3>直近の入力</h3><table class="table" id="recent-input-table"><thead><tr><th>日付</th><th>商品名</th><th>区分</th><th>数量</th><th>備考</th><th></th></tr></thead><tbody></tbody></table></section>
</main>
<footer class="app-footer">
  <span>© 2026 家計在庫アプリ（Web版）</span>
  <a href="https://github.com/" target="_blank" rel="noreferrer">GitHub Pages でホスト</a>
</footer>
<script src="app.js"></script>
</body>
</html>
